<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>런트립 · RunTrip</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <!-- 카카오맵 SDK: VITE_KAKAO_MAP_KEY 설정 시 자동 로드. 키 없으면 SVG 폴백 -->
  <script>
    (function () {
      var key = (window.__KAKAO_KEY__ = '%VITE_KAKAO_MAP_KEY%');
      if (key && key.indexOf('VITE_') === -1) {
        var s = document.createElement('script');
        s.src = '//dapi.kakao.com/v2/maps/sdk.js?appkey=' + key + '&libraries=services&autoload=false';
        s.async = true;
        document.head.appendChild(s);
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
